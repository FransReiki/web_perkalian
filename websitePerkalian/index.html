<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Halaman</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #startPage,
        #quizPage,
        #resultPage,
        #tableResultPage {
            background: white;
            width: 500px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
            text-align: center;
        }

        input {
            width: 100px;
            padding: 8px;
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        #progress {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }
        #restartButton {
    position: absolute;
    top: 15px;
    right: 15px;

    padding: 6px 12px;
    font-size: 14px;

    background: #ff4d4d;
    color: white;

    border: none;
    border-radius: 6px;

    cursor: pointer;
}

#restartButton:hover {
    background: #d93636;
}
    </style>
</head>

<body>

    <div id="startPage">
        <button onclick="controlPanelPembagianLangsung()">Mulai Pembagian</button>
        <hr>
        <button onclick="controlPanelPerkalian()">Mulai Perkalian</button>
    </div>

    <div id="quizPage" style="display:none;">
        <button id="restartButton" onclick="restart()">
            ⟳ Restart
        </button>

        <div id="progress"></div>
        <div id="question"></div>

        <input type="number" id="answer">
        <button onclick="next()">Enter</button>
    </div>

    <div id="resultPage" style="display:none;">
        <h1 id="correct"></h1>
        <h1 id="wrong"></h1>
        <button onclick="restart()">Main Lagi</button>
        <button onclick="tableResult()">Lihat Tabel Hasil</button>
    </div>

    <div id="tableResultPage" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Soal</th>
                    <th>Jawaban</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableQuestion"></tbody>
        </table>
    
        <button onclick="restart()">Main Lagi</button>
    </div>

    <script src="main.js"></script>

</body>

</html>
